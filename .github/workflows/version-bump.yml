name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        env:
          BUMP_TYPE: ${{ github.event.inputs.bump_type || 'patch' }}
        run: |
          NEW_VERSION=$(npm version "${BUMP_TYPE}" --no-git-tag-version)
          echo "Bumped version to ${NEW_VERSION}"

      - name: Commit version bump on PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          BRANCH_NAME="ci/version-bump-v${NEW_VERSION}"

          git checkout -b "${BRANCH_NAME}"
          git add package.json package-lock.json

          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push --set-upstream origin "${BRANCH_NAME}"
          gh pr create \
            --base main \
            --head "${BRANCH_NAME}" \
            --title "chore: bump version to ${NEW_VERSION}" \
            --body "Automated version bump PR created by the Version Bump workflow.\n\n- bump type: ${{ github.event.inputs.bump_type || 'patch' }}\n- version: ${NEW_VERSION}" \
            || gh pr view "${BRANCH_NAME}" --json url
